name: Build Android APK

on:
  workflow_dispatch: {}
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm install

      # Шаг eas init удалён, потому что проект уже существует на Expo
      # Если нужно пересоздать — раскомментируй, но тогда удали проект вручную через сайт
      # - name: Link or create EAS project
      #   run: eas init --non-interactive --force

      - name: Trigger cloud build (APK)
        run: eas build --platform android --profile preview --non-interactive --no-wait